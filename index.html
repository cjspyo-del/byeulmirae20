<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>별미래냉면 결제안내 (신한)</title>
    <style>
        body, html { margin: 0; padding: 0; height: 100%; background-color: #f4f1ea; font-family: 'Apple SD Gothic Neo', sans-serif; overflow: hidden; }
        .wrapper { display: flex; flex-direction: column; height: 100vh; align-items: center; justify-content: center; padding: 20px; box-sizing: border-box; }
        .card-display {
            width: 100%; max-width: 500px; aspect-ratio: 1024 / 637;
            background: url('card.jpg') no-repeat center center;
            background-size: cover; border-radius: 20px; box-shadow: 0 12px 40px rgba(0,0,0,0.15); margin-bottom: 40px;
        }
        .copy-btn {
            width: 100%; max-width: 350px; background-color: #0046ff; color: #fff;
            border: none; padding: 20px; border-radius: 15px; font-size: 18px;
            font-weight: bold; cursor: pointer; transition: all 0.2s ease; box-shadow: 0 4px 15px rgba(0, 70, 255, 0.3);
        }
        .copy-btn:active { background-color: #0035c2; transform: scale(0.95); }
        .hint { margin-top: 20px; font-size: 14px; color: #8a7b6a; }
    </style>
</head>
<body>
    <div class="wrapper">
        <div class="card-display"></div>
        <button class="copy-btn" onclick="copyAccount()">신한은행 계좌번호 복사하기</button>
        <div class="hint">버튼을 누르면 번호가 자동으로 복사됩니다.</div>
    </div>
    <script>
        function copyAccount() {
            var accountNumber = "110-534-192942"; 
            var textArea = document.createElement("textarea");
            textArea.value = accountNumber;
            textArea.style.position = "fixed";
            textArea.style.left = "-9999px";
            document.body.appendChild(textArea);
            textArea.focus();
            textArea.select();
            textArea.setSelectionRange(0, 9999);
            try {
                document.execCommand('copy');
                alert("신한은행 계좌번호가 복사되었습니다!\n" + accountNumber);
            } catch (err) {
                alert("복사에 실패했습니다.");
            }
            document.body.removeChild(textArea);
        }
    </script>
</body>
</html>
